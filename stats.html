    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Nunito', sans-serif;
            background: #FFE500;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            background: #000;
            border-radius: 12px;
            margin-bottom: 12px;
        }
        .header h1 {
            color: #FFE500;
            font-size: 20px;
            font-weight: 900;
        }
        .header a {
            color: #FF6B9D;
            text-decoration: none;
            font-weight: 900;
            font-size: 14px;
        }
        .stats-area {
            background: linear-gradient(180deg, #FFF5B8 0%, #FFE500 100%);
            border-radius: 20px;
            border: 4px solid #000;
            padding: 20px;
            overflow-y: auto;
        }
        .stat-card {
            background: rgba(0,0,0,0.85);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 12px;
        }
        .stat-card h2 {
            color: #FFE500;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            margin-bottom: 6px;
        }
        .stat-label {
            color: #fff;
            font-size: 14px;
            font-weight: 700;
        }
        .stat-value {
            color: #FFE500;
            font-size: 14px;
            font-weight: 900;
        }
        .stat-value.pink { color: #FF6B9D; }
        .stat-value.green { color: #00D4AA; }
        .loading {
            color: #999;
            text-align: center;
            padding: 20px;
            font-size: 14px;
        }
        .section-title {
            color: #000;
            font-size: 16px;
            font-weight: 900;
            margin: 15px 0 8px 0;
        }
        .chart-bar-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .chart-bar-label {
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            min-width: 60px;
            text-align: right;
        }
        .chart-bar-track {
            flex: 1;
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            overflow: hidden;
        }
        .chart-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #FF6B9D, #FFE500);
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .chart-bar-value {
            color: #FFE500;
            font-size: 12px;
            font-weight: 900;
            min-width: 40px;
        }
        .refresh-btn {
            background: #FF6B9D;
            color: #fff;
            border: none;
            padding: 10px 25px;
            font-size: 14px;
            font-weight: 900;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Nunito', sans-serif;
            display: block;
            margin: 15px auto 0;
        }
        .refresh-btn:hover { transform: scale(1.05); }
        .refresh-btn:active { transform: scale(0.95); }
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 11px;
            margin-top: 8px;
        }
    </style>

<body>
    <div class="container">
        <div class="header">

    <script>
        const SUPABASE_URL = 'https://zaorjgtttoxpyrhfgbah.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_Bk15vRPX9fHA9sKe06qltg_FpCWIgbj';

        async function supabaseQuery(endpoint) {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/${endpoint}`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`,
                    'Content-Type': 'application/json'
                }
            });
            return response.json();
        }

        function formatDuration(seconds) {
            if (seconds < 60) return seconds + 's';
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return m + 'm ' + s + 's';
        }

        function statRow(label, value, cls = '') {
            return `<div class="stat-row">
                <span class="stat-label">${label}</span>
                <span class="stat-value ${cls}">${value}</span>
            </div>`;
        }

        function barChart(data, maxVal) {
            if (!maxVal) maxVal = Math.max(...data.map(d => d.value), 1);
            return data.map(d => `
                <div class="chart-bar-container">
                    <span class="chart-bar-label">${d.label}</span>
                    <div class="chart-bar-track">
                        <div class="chart-bar-fill" style="width: ${(d.value / maxVal * 100).toFixed(1)}%"></div>
                    </div>
                    <span class="chart-bar-value">${d.value}</span>
                </div>
            `).join('');
        }

        async function loadAllStats() {
            try {
                // Load all sessions
                const sessions = await supabaseQuery('sessions?order=created_at.desc&limit=10000');
                // Load play count
                const stats = await supabaseQuery('stats?id=eq.play-count');
                const totalPlays = stats[0]?.value || 0;

                if (!sessions || sessions.length === 0) {
                    document.querySelectorAll('.stat-card .loading').forEach(el => {
                        el.textContent = 'No session data yet. Play some games!';
                    });
                    return;
                }

                // --- OVERVIEW ---
                const uniquePlayers = new Set(sessions.map(s => s.player_id)).size;
                const totalTime = sessions.reduce((sum, s) => sum + (s.duration_seconds || 0), 0);
                const totalFilms = sessions.reduce((sum, s) => sum + (s.films_sorted || 0), 0);
                const totalSessions = sessions.length;

                document.getElementById('overview-card').innerHTML = `
                    <h2>OVERVIEW</h2>
                    ${statRow('Total Games Played', parseInt(totalPlays).toLocaleString())}
                    ${statRow('Tracked Sessions', totalSessions.toLocaleString())}
                    ${statRow('Unique Players', uniquePlayers.toLocaleString(), 'green')}
                    ${statRow('Total Play Time', formatDuration(totalTime), 'pink')}
                    ${statRow('Total Films Sorted', totalFilms.toLocaleString())}
                `;

                // --- AVERAGES ---
                const avgScore = Math.round(sessions.reduce((s, x) => s + x.score, 0) / totalSessions);
                const avgLevel = (sessions.reduce((s, x) => s + x.level_reached, 0) / totalSessions).toFixed(1);
                const avgDuration = Math.round(sessions.reduce((s, x) => s + (x.duration_seconds || 0), 0) / totalSessions);
                const avgFilms = Math.round(sessions.reduce((s, x) => s + (x.films_sorted || 0), 0) / totalSessions);

                document.getElementById('averages-card').innerHTML = `
                    <h2>AVERAGES</h2>
                    ${statRow('Avg Score', avgScore.toLocaleString())}
                    ${statRow('Avg Level Reached', avgLevel)}
                    ${statRow('Avg Session Duration', formatDuration(avgDuration), 'pink')}
                    ${statRow('Avg Films Sorted', avgFilms)}
                `;

                // --- RECORDS ---
                const maxScore = Math.max(...sessions.map(s => s.score));
                const maxLevel = Math.max(...sessions.map(s => s.level_reached));
                const maxDuration = Math.max(...sessions.map(s => s.duration_seconds || 0));
                const maxFilms = Math.max(...sessions.map(s => s.films_sorted || 0));

                document.getElementById('records-card').innerHTML = `
                    <h2>ALL-TIME RECORDS</h2>
                    ${statRow('Highest Score', maxScore.toLocaleString(), 'green')}
                    ${statRow('Highest Level', maxLevel)}
                    ${statRow('Longest Session', formatDuration(maxDuration), 'pink')}
                    ${statRow('Most Films Sorted', maxFilms.toLocaleString())}
                `;

                // --- DEVICES ---
                const mobile = sessions.filter(s => s.device_type === 'mobile').length;
                const desktop = sessions.filter(s => s.device_type === 'desktop').length;
                const other = totalSessions - mobile - desktop;

                document.getElementById('devices-card').innerHTML = `
                    <h2>DEVICES</h2>
                    ${barChart([
                        { label: 'Mobile', value: mobile },
                        { label: 'Desktop', value: desktop },
                        ...(other > 0 ? [{ label: 'Other', value: other }] : [])
                    ])}
                `;

                // --- LEVEL DISTRIBUTION ---
                const levelCounts = {};
                sessions.forEach(s => {
                    const l = s.level_reached;
                    levelCounts[l] = (levelCounts[l] || 0) + 1;
                });
                const maxLevelNum = Math.max(...Object.keys(levelCounts).map(Number));
                const levelData = [];
                for (let i = 1; i <= maxLevelNum; i++) {
                    levelData.push({ label: 'Lvl ' + i, value: levelCounts[i] || 0 });
                }

                document.getElementById('levels-card').innerHTML = `
                    <h2>LEVEL DISTRIBUTION</h2>
                    <p style="color: #999; font-size: 11px; margin-bottom: 10px;">How far players get</p>
                    ${barChart(levelData)}
                `;

                // --- TOP COUNTRIES ---
                const countryCounts = {};
                sessions.forEach(s => {
                    const c = s.country || 'unknown';
                    countryCounts[c] = (countryCounts[c] || 0) + 1;
                });
                const countryData = Object.entries(countryCounts)
                    .sort((a, b) => b[1] - a[1])
                    .slice(0, 10)
                    .map(([label, value]) => ({ label, value }));

                document.getElementById('countries-card').innerHTML = `
                    <h2>TOP COUNTRIES</h2>
                    ${barChart(countryData)}
                `;

                // --- LAST 7 DAYS ---
                const now = new Date();
                const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const dayData = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date(now);
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toISOString().split('T')[0];
                    const count = sessions.filter(s => s.created_at && s.created_at.startsWith(dateStr)).length;
                    const label = dayNames[d.getDay()] + ' ' + d.getDate();
                    dayData.push({ label, value: count });
                }

                document.getElementById('activity-card').innerHTML = `
                    <h2>LAST 7 DAYS</h2>
                    ${barChart(dayData)}
                `;

                document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();

            } catch (e) {
                console.error('Stats load failed:', e);
                document.querySelectorAll('.stat-card .loading').forEach(el => {
                    el.textContent = 'Failed to load stats.';
                });
            }
        }

        // Load on page load
        loadAllStats();
    </script>
</body>
</html>
